        /* CUSTOM CURSOR */
        #cursor {
            position: fixed; top: 0; left: 0; width: 10px; height: 10px;
            background: var(--yellow); border-radius: 50%; pointer-events: none;
            z-index: 9999; mix-blend-mode: difference; transition: transform 0.1s ease-out; display: none;
        }
        #cursor-follower {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            border: 1px solid var(--yellow); border-radius: 50%; pointer-events: none;
            z-index: 9998; transition: transform 0.15s ease-out; display: none;

        @media (pointer: fine) { #cursor, #cursor-follower { display: block; } }

        .container { max-width: var(--container); margin: 0 auto; padding: 0 32px; }

        /* NOISE & TEXTURE */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 9000;
        }

        /* TICKER */
        .ticker {
            background: var(--yellow); height: 40px; overflow: hidden;
            display: flex; align-items: center; position: sticky; top: 0; z-index: 500;

        .ticker-item {
            color: var(--ink); font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.15em; padding: 0 40px;
            display: flex; align-items: center; gap: 12px;

        .ticker-dot { width: 5px; height: 5px; background: var(--ink); border-radius: 50%; opacity: 0.3; }

                ],
                reviews: [

                    { name: "Daniel K.", meta: "USA • 2026", text: "Best night of my trip to Rio. Maracanã is magic." }
                ]
            },
            es: {
                eyebrow: "Amistoso Oficial • Pre-Mundial 2026",
                headline: "La **despedida histórica** de la Selección en el Maracanã — último partido en suelo brasileño antes de la **Copa del Mundo 2026**",
                br: "Brasil", br_r: "Local", pan: "Panamá", pan_r: "Visitante",
                date: "📅 31 de Mayo, 2026", time: "⏰ 18h30 BRT", venue: "🏟️ Estadio Maracanã",
                s_eyebrow: "Entradas Oficiales", s_title: "Sectores Disponibles", s_desc: "Todos los paquetes incluyen traslado VIP y guía especializado.",
                inc_title: "¿Qué está incluido?", inc_desc: "Nos encargamos de todo para que disfrutes del juego.",
                rev_title: "Reseñas Reales", rev_desc: "Lo que dicen los viajeros que fueron al Maracanã con nosotros.",
                cta: "Comprar Entrada", unavailable: "Aún no disponible", btn_un: "No disponible",
                f_copy: "Ofrecemos experiencias auténticas y seguras para viajeros internacionales en Río de Janeiro.",
                sectors: [
                    { name: "Leste Inferior", desc: "Vista privilegiada del centro del campo", premium: true, tags: ["Más Buscado", "Premium"] },
                    { name: "Oeste Inferior", desc: "Sector VIP con asientos cómodos", premium: false, tags: ["Confort", "Cubierto"] },
                    { name: "Leste Superior", desc: "Vista panorámica de todo el estadio", premium: false, tags: ["Panorámico"] },
                    { name: "Norte / Sur", desc: "Siente la energía de la hinchada local", premium: false, tags: ["Atmósfera"] }
                ],
                includes: [

                    { name: "Daniel K.", meta: "EE.UU. • 2026", text: "La mejor noche de mi viaje a Río. El Maracanã es mágico." }
                ]
            }
        };

        let lang = 'pt';
        
        function setLang(l) {
            lang = l;
            const t = data[lang];
            document.getElementById('eyebrow').innerText = t.eyebrow;
            document.getElementById('headline').innerHTML = t.headline.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('br-name').innerText = t.br;
            document.getElementById('br-role').innerText = t.br_r;
            document.getElementById('pan-name').innerText = t.pan;
            document.getElementById('pan-role').innerText = t.pan_r;
            document.getElementById('m-date').innerText = t.date;
            document.getElementById('m-time').innerText = t.time;
            document.getElementById('m-venue').innerText = t.venue;
            document.getElementById('s-eyebrow').innerText = t.s_eyebrow;
            document.getElementById('s-title').innerText = t.s_title;
            document.getElementById('s-desc').innerText = t.s_desc;
            document.getElementById('inc-title').innerText = t.inc_title;
            document.getElementById('inc-desc').innerText = t.inc_desc;
            document.getElementById('rev-title').innerText = t.rev_title;
            document.getElementById('rev-desc').innerText = t.rev_desc;
            document.getElementById('f-copy').innerText = t.f_copy;
            document.getElementById('nav-cta').innerText = t.cta;
            document.getElementById('lang').value = lang;

            // Grid Sectors
            document.getElementById('grid').innerHTML = t.sectors.map(s => `
                <div class="card ${s.premium ? 'premium' : ''}">
                    <div class="card-name">${s.name}</div>
                    <div class="card-desc">${s.desc}</div>
                    <div class="card-price">${t.unavailable}</div>
                    <div class="tag-row">${s.tags.map(tag => `<span class="tag ${s.premium ? 'accent' : ''}">${tag}</span>`).join('')}</div>
                    <div class="card-cta">${t.btn_un}</div>
                </div>
            `).join('');

            // Included Grid
            document.getElementById('inc-grid').innerHTML = t.includes.map(i => `
                <div class="inc-card">
                    <div class="inc-icon">${i.icon}</div>
                    <div class="inc-content">
                        <h4>${i.title}</h4>
                        <p>${i.desc}</p>
                    </div>
                </div>
            `).join('');

            // Reviews
            document.getElementById('rev-grid').innerHTML = t.reviews.map(r => `
                <div class="rev-card">
                    <div class="rev-stars">★★★★★</div>
                    <p class="rev-text">"${r.text}"</p>
                    <div class="rev-user">
                        <div class="rev-info">
                            <h5>${r.name}</h5>
                            <p>${r.meta}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            // Ticker
            const items = [t.eyebrow, t.s_eyebrow, t.date];
            document.getElementById('ticker-track').innerHTML = [...items, ...items, ...items, ...items].map(i => `<div class="ticker-item">${i}</div><div class="ticker-dot"></div>`).join('');

            // Lang Links
            document.querySelectorAll('.l-link').forEach(el => el.classList.remove('active'));
            document.getElementById('l-' + lang).classList.add('active');

            // Re-bind cursor
            bindCursor();
        }

        function bindCursor() {
            document.querySelectorAll('a, button, select, .l-link, .card').forEach(el => {
                el.onmouseenter = () => {
                    document.getElementById('cursor').style.transform = 'scale(4)';
                    document.getElementById('cursor').style.opacity = '0.2';
                };
                el.onmouseleave = () => {
                    document.getElementById('cursor').style.transform = 'scale(1)';
                    document.getElementById('cursor').style.opacity = '1';
                };
            });
        }

        // CURSOR MOVEMENT
        document.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('cursor');
            const follower = document.getElementById('cursor-follower');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
            follower.style.transform = 'translate(-20px, -20px)';
            cursor.style.transform += ' translate(-5px, -5px)';
        });

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('nav');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        setLang('pt');
    </script>
</body>
</html>
