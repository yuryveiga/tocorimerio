            --ink:         #0E0E0F;
            --ink-2:       #17181a;
            --ink-3:       #222326;
            --ink-4:       #2e3035;
            --muted:       #8a8d96;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        .reveal.in { opacity: 1; transform: translateY(0); }
        .yellow { color: var(--yellow) !important; font-weight: 700; }

        /* TICKER */
        .ticker-wrap {
            background: var(--yellow);
            overflow: hidden;
            white-space: nowrap;
            height: 42px;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 201;
        }
        .ticker-track {
            display: inline-flex;
            animation: ticker-bp 35s linear infinite;
        }
        @keyframes ticker-bp {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 0 40px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink);
        }
        .ticker-dot { width: 4px; height: 4px; background: var(--ink); border-radius: 50%; opacity: .4; flex-shrink: 0; }

        /* HEADER & CONTROLS */
        header-nav {
            position: fixed; top: 42px; left: 0; right: 0; z-index: 200;
            background: rgba(14, 14, 15, 0.85);
            backdrop-filter: blur(20px) saturate(1.8);
            border-bottom: 1px solid var(--border);
            transition: 0.4s;

        header-nav.scrolled { top: 0; background: rgba(14, 14, 15, 0.95); }

            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo { display: flex; align-items: center; gap: 14px; }
        .nav-logo img { height: 40px; }
        .nav-logo span { font-weight: 800; font-size: 20px; letter-spacing: -0.02em; }
        
        .nav-actions { display: flex; align-items: center; gap: 12px; }
        
        .control-select {
            background: var(--ink-3);
            border: 1px solid var(--border-2);
            color: var(--white);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
        }

        .btn-main {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: var(--white);
            font-size: 14px;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 100px;
            box-shadow: 0 8px 30px rgba(42,157,143,0.3);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(42,157,143,0.4); }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            background: var(--ink);
            padding-top: 100px;

            background-size: cover; background-position: center;
            filter: brightness(0.35) saturate(1.2);
            z-index: 0;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, var(--ink) 90%);
            z-index: 1;
        }

        .hero-pill {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-2);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--yellow);
            margin-bottom: 40px;
        }

        .team-sub { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
        
        .vs-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .vs-line { width: 1px; height: 50px; background: linear-gradient(to bottom, transparent, var(--border-2), transparent); }
        .vs-label { font-size: 14px; font-weight: 800; color: var(--teal); letter-spacing: 0.1em; }

            color: var(--muted);
            margin-bottom: 48px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .meta-chips {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
            margin-bottom: 50px;
        }
        .chip {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--ink-3); border: 1px solid var(--border-2);
            padding: 10px 20px; border-radius: 100px; font-size: 14px; font-weight: 500;
            transition: 0.3s;

        .chip:hover { border-color: var(--teal); transform: translateY(-2px); }

        /* SECTORS */
        .section-header { text-align: center; margin-bottom: 80px; }
        .eyebrow {
            display: flex; align-items: center; gap: 10px; justify-content: center;

            color: var(--teal); margin-bottom: 20px;

        .section-sub { color: var(--muted); max-width: 650px; margin: 0 auto; font-size: 18px; }

        .sectors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 28px;
            margin-bottom: 100px;

        .sector-card {
            background: var(--ink-2);
            padding: 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 24px;

        .sector-desc { font-size: 13px; color: var(--muted); }
        .sector-price { font-size: 22px; font-weight: 800; color: var(--muted-2); }
        
        .sector-perks { display: flex; flex-wrap: wrap; gap: 8px; }
        .perk-tag { font-size: 11px; font-weight: 700; background: var(--ink-4); padding: 5px 12px; border-radius: 6px; color: var(--muted); }

        .info-col-val { font-size: 24px; font-weight: 800; color: var(--white); }

                    { name: "Leste Superior", desc: "Vista panorámica", premium: false, perks: ["perk_view", "perk_value"] },
                    { name: "Norte / Sur", desc: "Detrás de los arcos", premium: false, perks: ["perk_value"] }
                ]
            }
        };

        let currentLang = 'pt';
        let currentCurrency = 'BRL';

        function renderBold(text) {
            if (!text) return "";
            return text.replace(/\*\*(.*?)\*\*/g, '<span class="yellow">$1</span>');
        }

        function updateUI() {
            const t = translations[currentLang];
            
            // Meta
            document.title = t.title;
            document.getElementById('meta-title').innerText = t.title;
            document.getElementById('meta-desc').setAttribute('content', t.desc);

            // Hero
            document.getElementById('hero-eyebrow').innerText = t.hero_eyebrow;
            document.getElementById('hero-headline').innerHTML = renderBold(t.hero_headline);
            document.getElementById('team-br').innerText = t.br;
            document.getElementById('team-br-sub').innerText = t.br_sub;
            document.getElementById('team-pan').innerText = t.pan;
            document.getElementById('team-pan-sub').innerText = t.pan_sub;
            document.getElementById('meta-date').innerText = t.date;
            document.getElementById('meta-time').innerText = t.time;
            document.getElementById('meta-venue').innerText = t.venue;
            document.getElementById('meta-gates').innerText = t.gates;

            // Nav
            document.getElementById('nav-cta').innerText = t.nav_cta;

            // Sectors Header
            document.getElementById('sectors-eyebrow').innerText = t.sectors_eyebrow;
            document.getElementById('sectors-title').innerText = t.sectors_title;
            document.getElementById('sectors-desc').innerText = t.sectors_desc;

            // Info Strip
            document.getElementById('log-bio-label').innerText = t.log_bio_label;
            document.getElementById('log-bio-val').innerText = t.log_bio_val;
            document.getElementById('log-bio-sub').innerText = t.log_bio_sub;
            document.getElementById('log-sale-label').innerText = t.log_sale_label;
            document.getElementById('log-sale-val').innerText = t.log_sale_val;
            document.getElementById('log-sale-sub').innerText = t.log_sale_sub;
            document.getElementById('log-docs-label').innerText = t.log_docs_label;
            document.getElementById('log-docs-val').innerText = t.log_docs_val;
            document.getElementById('log-docs-sub').innerText = t.log_docs_sub;

            // Footer
            document.getElementById('footer-text').innerText = t.footer_text;
            
            // Languages Footer Active
            ['pt', 'en', 'es'].forEach(l => {
                document.getElementById(`lang-${l}`).classList.toggle('active', currentLang === l);
            });

            // Grid
            const grid = document.getElementById('sectors-grid');
            grid.innerHTML = t.sectors.map(s => `
                <div class="sector-card ${s.premium ? 'premium' : ''} reveal in">
                    <div class="sector-top">
                        <div class="sector-name">${s.name}</div>
                        <div class="sector-desc">${s.desc}</div>
                    </div>
                    <div class="sector-price">${t.unavailable}</div>
                    <div class="sector-perks">
                        ${s.perks.map(p => `<span class="perk-tag ${p === 'perk_premium' ? 'highlight' : ''}">${t[p]}</span>`).join('')}
                    </div>
                    <div class="sector-cta">${t.btn_unavailable}</div>
                </div>
            `).join('');

            // Ticker
            const tickerItems = [t.hero_eyebrow, t.log_sale_sub, t.log_bio_label + " " + t.log_bio_val];
            const tickerTrack = document.getElementById('ticker-track');
            const tickerHtml = [...tickerItems, ...tickerItems, ...tickerItems].map(item => `
                <div class="ticker-item">${item}</div><div class="ticker-dot"></div>
            `).join('');
            tickerTrack.innerHTML = tickerHtml + tickerHtml;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-select').value = lang;
            updateUI();
        }

        function changeCurrency(curr) {
            currentCurrency = curr;
            // Currency conversion logic would go here if prices were available
            updateUI();
        }

        // SCROLL REVEAL
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 80) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');

            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.9) {
                    el.classList.add('in');
                }
            });
        });

        // INITIALIZE
        updateUI();
        setTimeout(() => {
            document.querySelectorAll('.reveal').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight) el.classList.add('in');
            });
        }, 100);
    </script>
</body>
</html>
