<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Brasil vs Panamá | Experiência VIP Maracanã | TocorimeRio</title>
    <meta name="description" id="meta-desc" content="Garanta seu lugar no Maracanã para o histórico Brasil vs Panamá. Transfer de luxo e guia especializado incluídos.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --yellow:      #FFD700;
            --teal:        #2A9D8F;
            --teal-glow:   rgba(42,157,143,0.4);
            --white:       #FFFFFF;
            --ink:         #080809;
            --ink-2:       #111214;
            --ink-3:       #1c1d21;
            --border:      rgba(255,255,255,0.06);
            --border-glow: rgba(42,157,143,0.2);
            --radius-lg:   24px;
            --radius-md:   16px;
            --radius-sm:   12px;
            --container:   1200px;
            --transition:  0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--ink);
            color: var(--white);
            font-family: 'Sora', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* CUSTOM CURSOR - Design Spell */
        #cursor {
            position: fixed; top: 0; left: 0;
            width: 20px; height: 20px;
            background: var(--yellow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
            display: none;
        }
        #cursor-follower {
            position: fixed; top: 0; left: 0;
            width: 40px; height: 40px;
            border: 1px solid var(--yellow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease-out;
            display: none;
        }
        @media (pointer: fine) { #cursor, #cursor-follower { display: block; } }

        .container { max-width: var(--container); margin: 0 auto; padding: 0 32px; }

        /* NOISE OVERLAY - Frontend Design Texture */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 9000;
        }

        /* AMBIENT GLOWS */
        .glow {
            position: absolute; width: 60vw; height: 60vw;
            background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%);
            filter: blur(80px); opacity: 0.3; pointer-events: none; z-index: 0;
        }

        /* TICKER */
        .ticker {
            background: var(--yellow); height: 40px; overflow: hidden;
            display: flex; align-items: center; position: sticky; top: 0; z-index: 500;
        }
        .ticker-track { display: flex; animation: scroll 30s linear infinite; white-space: nowrap; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-item {
            color: var(--ink); font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.15em; padding: 0 40px;
            display: flex; align-items: center; gap: 12px;
        }
        .ticker-dot { width: 5px; height: 5px; background: var(--ink); border-radius: 50%; opacity: 0.3; }

        /* NAV */
        nav {
            position: fixed; top: 40px; left: 0; width: 100%; z-index: 400;
            padding: 24px 0; transition: var(--transition);
        }
        nav.scrolled { background: rgba(8, 8, 9, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 0; }
        .nav-flex { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 18px; }
        .logo img { height: 36px; }

        .nav-controls { display: flex; gap: 8px; }
        select {
            background: var(--ink-3); color: var(--white); border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
            outline: none; cursor: pointer; transition: 0.3s;
        }
        select:hover { border-color: var(--teal); }

        /* HERO */
        .hero {
            position: relative; height: 100vh; min-height: 800px;
            display: flex; align-items: center; justify-content: center;
            padding-top: 100px; overflow: hidden; text-align: center;
        }
        .hero-media {
            position: absolute; inset: 0; z-index: -1;
            background: url('https://i0.wp.com/www.portaleducadora.com/wp-content/uploads/2023/10/estadio-do-maracana-na-copa-das-americas-2019.jpeg') center/cover no-repeat;
            filter: brightness(0.3) saturate(1.2);
        }
        .hero-vignette { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 0%, var(--ink) 95%); }

        .hero-eyebrow {
            display: inline-block; padding: 10px 24px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 100px;
            font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--yellow); margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .match-display { display: flex; align-items: center; justify-content: center; gap: 60px; margin-bottom: 60px; }
        .team { width: 220px; animation: float 6s ease-in-out infinite; }
        .team.away { animation-delay: -3s; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .crest { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); margin-bottom: 24px; }
        .team-name { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 900; letter-spacing: -0.03em; }
        .team-role { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.15em; }

        .vs { font-size: 14px; font-weight: 900; color: var(--teal); letter-spacing: 0.2em; opacity: 0.5; }

        .headline {
            font-size: clamp(18px, 4vw, 24px); font-weight: 300; color: var(--muted);
            max-width: 900px; margin: 0 auto 60px; line-height: 1.5;
        }
        .headline strong { color: var(--yellow); font-weight: 700; }

        .meta-grid { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .meta-item {
            background: var(--ink-2); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 10px; transition: 0.4s;
        }
        .meta-item:hover { border-color: var(--teal); background: var(--ink-3); transform: translateY(-3px); }

        /* SECTORS - Bento Grid Style */
        .sectors { padding: 120px 0; background: var(--ink-2); }
        .section-header { text-align: center; margin-bottom: 100px; }
        .h2 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 8vw, 72px); line-height: 1; margin-bottom: 32px; }
        
        .bento-grid {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
        }
        .card {
            grid-column: span 6; background: var(--ink); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 48px; position: relative;
            overflow: hidden; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card:hover { border-color: var(--teal); transform: scale(1.02); }
        .card.premium { grid-column: span 6; background: linear-gradient(135deg, #0a1a18 0%, var(--ink) 100%); }
        .card.small { grid-column: span 4; padding: 32px; }
        
        .card-name { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .card-desc { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
        .card-price { font-size: 14px; font-weight: 700; color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.1em; }
        
        .card-tags { display: flex; gap: 8px; margin-top: auto; }
        .tag { font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 6px; background: var(--ink-3); color: var(--muted); text-transform: uppercase; }
        .tag.accent { background: rgba(42,157,143,0.1); color: var(--teal); }

        /* BUTTONS */
        .btn {
            display: inline-flex; align-items: center; gap: 12px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            padding: 16px 40px; border-radius: 100px; font-weight: 800; font-size: 15px;
            box-shadow: 0 10px 40px var(--teal-glow); transition: 0.4s;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 20px 60px var(--teal-glow); }

        /* FOOTER */
        footer { padding: 120px 0; text-align: center; border-top: 1px solid var(--border); }
        .footer-logo { font-size: 32px; font-weight: 900; margin-bottom: 40px; display: block; }
        .footer-links { display: flex; justify-content: center; gap: 32px; margin-bottom: 40px; }
        .f-link { font-size: 12px; font-weight: 700; color: var(--muted); opacity: 0.5; transition: 0.3s; }
        .f-link.active { color: var(--yellow); opacity: 1; }

        @media (max-width: 992px) {
            .card { grid-column: span 12 !important; }
            .match-display { flex-direction: column; gap: 30px; }
            .hero { height: auto; padding-bottom: 100px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>
    <div class="noise"></div>

    <div class="ticker">
        <div class="ticker-track" id="ticker-track"></div>
    </div>

    <nav id="nav">
        <div class="container nav-flex">
            <a href="/" class="logo">
                <img src="https://ogzasprtfgimjqrtcseg.supabase.co/storage/v1/render/image/public/site-images/1776136512230_pbsqj7cxjr.webp?quality=70&width=800&format=avif&resize=contain&v=1778307264662" alt="Toco">
                <span>TocorimeRio</span>
            </a>
            <div class="nav-controls">
                <select id="lang" onchange="setLang(this.value)">
                    <option value="pt">PT</option>
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                </select>
                <select id="curr">
                    <option value="BRL">R$ BRL</option>
                    <option value="USD">$ USD</option>
                </select>
                <a href="https://tocorimerio.com/match/brasil-vs-panam-2026-05-31" class="btn" style="padding: 10px 24px; font-size: 13px;" id="nav-cta"></a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-media"></div>
            <div class="hero-vignette"></div>
            <div class="glow" style="top: -10%; left: -10%;"></div>
            
            <div class="container">
                <div class="hero-eyebrow" id="eyebrow"></div>
                
                <div class="match-display">
                    <div class="team">
                        <img src="https://ruacloirelfsbejduefa.supabase.co/storage/v1/object/public/crests/e996b731-bddd-4da8-972d-0080b80186ea/mandante.png" class="crest">
                        <div class="team-role" id="br-role"></div>
                        <div class="team-name" id="br-name"></div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="team away">
                        <img src="https://ruacloirelfsbejduefa.supabase.co/storage/v1/object/public/crests/e996b731-bddd-4da8-972d-0080b80186ea/visitante.png" class="crest">
                        <div class="team-role" id="pan-role"></div>
                        <div class="team-name" id="pan-name"></div>
                    </div>
                </div>

                <h1 class="headline" id="headline"></h1>

                <div class="meta-grid">
                    <div class="meta-item"><span id="m-date"></span></div>
                    <div class="meta-item"><span id="m-time"></span></div>
                    <div class="meta-item"><span id="m-venue"></span></div>
                </div>
            </div>
        </section>

        <section class="sectors">
            <div class="container">
                <div class="section-header">
                    <div class="eyebrow" id="s-eyebrow"></div>
                    <h2 class="h2" id="s-title"></h2>
                    <p class="headline" style="font-size: 18px;" id="s-desc"></p>
                </div>

                <div class="bento-grid" id="grid"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <span class="footer-logo">TocorimeRio</span>
            <div class="footer-links">
                <span class="f-link" id="f-pt" onclick="setLang('pt')">PT</span>
                <span class="f-link" id="f-en" onclick="setLang('en')">EN</span>
                <span class="f-link" id="f-es" onclick="setLang('es')">ES</span>
            </div>
            <p id="f-copy" style="color: var(--muted); font-size: 14px; max-width: 600px; margin: 0 auto;"></p>
        </div>
    </footer>

    <script>
        const data = {
            pt: {
                eyebrow: "Amistoso Oficial • Pré-Copa 2026",
                headline: "A **despedida histórica** da Seleção no Maracanã — último jogo em solo brasileiro antes da **Copa do Mundo 2026**",
                br: "Brasil", br_r: "Mandante", pan: "Panamá", pan_r: "Visitante",
                date: "📅 31 de Maio", time: "⏰ 18h30 BRT", venue: "🏟️ Maracanã",
                s_eyebrow: "Ingressos Oficiais", s_title: "Escolha seu setor", s_desc: "Pacotes exclusivos com transfer e guia bilíngue incluídos.",
                cta: "Comprar Ingresso", unavailable: "Ainda não disponível",
                f_copy: "Experiências premium para viajantes internacionais no Rio.",
                sectors: [
                    { name: "Leste Inferior", desc: "Visão privilegiada central", premium: true, tags: ["Premium", "Central"] },
                    { name: "Oeste Inferior", desc: "Setor VIP coberto", premium: false, tags: ["Conforto", "VIP"] },
                    { name: "Leste Superior", desc: "Visão panorâmica", premium: false, tags: ["Panorâmico"] },
                    { name: "Norte / Sul", desc: "Clima de torcida", premium: false, tags: ["Popular"] }
                ]
            },
            en: {
                eyebrow: "Official Friendly • Pre-World Cup 2026",
                headline: "The **historic farewell** of the National Team at Maracanã — last game on Brazilian soil before the **2026 World Cup**",
                br: "Brazil", br_r: "Home", pan: "Panama", pan_r: "Away",
                date: "📅 May 31", time: "⏰ 6:30 PM BRT", venue: "🏟️ Maracanã",
                s_eyebrow: "Official Tickets", s_title: "Select your sector", s_desc: "Exclusive packages with luxury transfer and bilingual guide.",
                cta: "Buy Ticket", unavailable: "Not available yet",
                f_copy: "Premium experiences for international travelers in Rio.",
                sectors: [
                    { name: "Lower East", desc: "Privileged central view", premium: true, tags: ["Premium", "Central"] },
                    { name: "Lower West", desc: "VIP covered sector", premium: false, tags: ["Comfort", "VIP"] },
                    { name: "Upper East", desc: "Panoramic view", premium: false, tags: ["Panoramic"] },
                    { name: "North / South", desc: "Crowd atmosphere", premium: false, tags: ["Popular"] }
                ]
            },
            es: {
                eyebrow: "Amistoso Oficial • Pre-Mundial 2026",
                headline: "La **despedida histórica** de la Selección en el Maracanã — último partido en suelo brasileño antes de la **Copa del Mundo 2026**",
                br: "Brasil", br_r: "Local", pan: "Panamá", pan_r: "Visitante",
                date: "📅 31 de Mayo", time: "⏰ 18h30 BRT", venue: "🏟️ Maracanã",
                s_eyebrow: "Entradas Oficiales", s_title: "Elige tu sector", s_desc: "Paquetes exclusivos con traslado de lujo y guía bilingüe.",
                cta: "Comprar Entrada", unavailable: "Aún no disponible",
                f_copy: "Experiencias premium para viajeros internacionales en Río.",
                sectors: [
                    { name: "Leste Inferior", desc: "Vista privilegiada central", premium: true, tags: ["Premium", "Central"] },
                    { name: "Oeste Inferior", desc: "Sector VIP cubierto", premium: false, tags: ["Confort", "VIP"] },
                    { name: "Leste Superior", desc: "Vista panorámica", premium: false, tags: ["Panorámico"] },
                    { name: "Norte / Sur", desc: "Clima de hinchada", premium: false, tags: ["Popular"] }
                ]
            }
        };

        let lang = 'pt';
        
        function setLang(l) {
            lang = l;
            const t = data[lang];
            document.getElementById('eyebrow').innerText = t.eyebrow;
            document.getElementById('headline').innerHTML = t.headline.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('br-name').innerText = t.br;
            document.getElementById('br-role').innerText = t.br_r;
            document.getElementById('pan-name').innerText = t.pan;
            document.getElementById('pan-role').innerText = t.pan_r;
            document.getElementById('m-date').innerText = t.date;
            document.getElementById('m-time').innerText = t.time;
            document.getElementById('m-venue').innerText = t.venue;
            document.getElementById('s-eyebrow').innerText = t.s_eyebrow;
            document.getElementById('s-title').innerText = t.s_title;
            document.getElementById('s-desc').innerText = t.s_desc;
            document.getElementById('f-copy').innerText = t.f_copy;
            document.getElementById('nav-cta').innerText = t.cta;
            document.getElementById('lang').value = lang;

            const grid = document.getElementById('grid');
            grid.innerHTML = t.sectors.map(s => `
                <div class="card ${s.premium ? 'premium' : 'small'}">
                    <div class="card-name">${s.name}</div>
                    <div class="card-desc">${s.desc}</div>
                    <div class="card-price">${t.unavailable}</div>
                    <div class="card-tags">
                        ${s.tags.map(tag => `<span class="tag ${s.premium ? 'accent' : ''}">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');

            const tickerTrack = document.getElementById('ticker-track');
            const items = [t.eyebrow, t.s_eyebrow, t.date + " " + t.time];
            tickerTrack.innerHTML = [...items, ...items, ...items, ...items].map(i => `<div class="ticker-item">${i}</div><div class="ticker-dot"></div>`).join('');

            document.querySelectorAll('.f-link').forEach(el => el.classList.remove('active'));
            document.getElementById('f-' + lang).classList.add('active');
        }

        // CURSOR LOGIC - Design Spell
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX - 10}px, ${e.clientY - 10}px, 0)`;
            follower.style.transform = `translate3d(${e.clientX - 20}px, ${e.clientY - 20}px, 0)`;
        });

        document.querySelectorAll('a, button, select, .f-link').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform += ' scale(3)';
                cursor.style.opacity = '0.3';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = cursor.style.transform.replace(' scale(3)', '');
                cursor.style.opacity = '1';
            });
        });

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('nav');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        setLang('pt');
    </script>
</body>
</html>
